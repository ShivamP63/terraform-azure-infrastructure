<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Terraform Azure Infrastructure architecture</title>
  <desc id="desc">Terraform stores remote state in Azure Blob Storage and deploys networking, compute, storage, and monitoring resources into an Azure resource group.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
    <style>
      .box{fill:#fff;stroke:#2563eb;stroke-width:2;rx:12}.group{fill:#eff6ff;stroke:#60a5fa;stroke-width:2;rx:18}.text{font-family:Arial,sans-serif;fill:#0f172a;font-size:18px}.small{font-size:15px;fill:#334155}.line{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:8 6}
    </style>
  </defs>
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="600" y="42" text-anchor="middle" class="text" style="font-size:28px;font-weight:bold">Terraform Azure Infrastructure</text>

  <rect x="45" y="95" width="210" height="90" class="box"/>
  <text x="150" y="132" text-anchor="middle" class="text">Terraform CLI</text>
  <text x="150" y="160" text-anchor="middle" class="small">AzureRM provider</text>

  <rect x="45" y="235" width="210" height="90" class="box"/>
  <text x="150" y="272" text-anchor="middle" class="text">Remote state</text>
  <text x="150" y="300" text-anchor="middle" class="small">Azure Blob Storage</text>

  <rect x="310" y="75" width="845" height="625" class="group"/>
  <text x="732" y="112" text-anchor="middle" class="text" style="font-weight:bold">Resource group: rg-contoso-terraform-dev</text>

  <rect x="350" y="150" width="330" height="215" class="box"/>
  <text x="515" y="183" text-anchor="middle" class="text">Networking module</text>
  <text x="375" y="220" class="small">VNet 10.10.0.0/16</text>
  <text x="375" y="250" class="small">Web subnet 10.10.1.0/24</text>
  <text x="375" y="280" class="small">Management subnet 10.10.2.0/24</text>
  <text x="375" y="310" class="small">NSG: HTTP, HTTPS, scoped SSH</text>
  <text x="375" y="340" class="small">Public IP and NIC connection</text>

  <rect x="735" y="150" width="365" height="215" class="box"/>
  <text x="918" y="183" text-anchor="middle" class="text">Compute module</text>
  <text x="760" y="220" class="small">Ubuntu 22.04 Linux VM</text>
  <text x="760" y="250" class="small">SSH key authentication</text>
  <text x="760" y="280" class="small">System-assigned managed identity</text>
  <text x="760" y="310" class="small">Boot diagnostics</text>
  <text x="760" y="340" class="small">Azure Monitor Agent extension</text>

  <rect x="350" y="420" width="330" height="215" class="box"/>
  <text x="515" y="453" text-anchor="middle" class="text">Storage module</text>
  <text x="375" y="495" class="small">StorageV2 / Standard LRS</text>
  <text x="375" y="525" class="small">Private application-data container</text>
  <text x="375" y="555" class="small">TLS 1.2 and HTTPS only</text>
  <text x="375" y="585" class="small">Versioning and delete retention</text>

  <rect x="735" y="420" width="365" height="215" class="box"/>
  <text x="918" y="453" text-anchor="middle" class="text">Monitoring module</text>
  <text x="760" y="490" class="small">Data Collection Rule → Log Analytics</text>
  <text x="760" y="520" class="small">Linux Syslog collection</text>
  <text x="760" y="550" class="small">CPU metric alert</text>
  <text x="760" y="580" class="small">Action group → email notification</text>

  <path d="M255 140 L310 140" class="line"/>
  <path d="M150 185 L150 235" class="line dash"/>
  <path d="M680 255 L735 255" class="line"/>
  <path d="M918 365 L918 420" class="line"/>
  <path d="M680 528 L735 528" class="line dash"/>
  <text x="705" y="242" text-anchor="middle" class="small">subnet ID</text>
  <text x="945" y="397" text-anchor="middle" class="small">VM ID</text>
</svg>
